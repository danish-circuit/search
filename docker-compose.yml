services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
      POSTGRES_DB: search
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql runs automatically the first time the data volume is created.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d search"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so it points at the compose service, regardless
      # of what's in .env (which defaults to the same value anyway).
      DATABASE_URL: postgresql://search:search@db:5432/search
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    command:
      [
        "uv", "run", "streamlit", "run", "frontend/streamlit_app.py",
        "--server.port=8501", "--server.address=0.0.0.0",
        "--server.headless=true", "--browser.gatherUsageStats=false",
      ]
    environment:
      # The frontend talks to the backend over the compose network.
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata: