# RAGAS-style judge prompts for the evaluator.
#
# Ported from circuit's benchamin (algos/config/benchamin/metrics.yaml), which in
# turn ports them from https://github.com/explodinggradients/ragas (Apache-2.0).
# Each multi-step metric (AnswerCompleteness / AnswerCorrectness / Faithfulness /
# ContextPrecision / ContextRecall) decomposes into one or more of these prompts;
# the orchestration lives in evaluator/ragas.py + evaluator/metrics.py.

statement_extractor:
  template: |
    Given a question and an answer, analyze the complexity of each sentence in the
    answer. Break down each sentence into one or more fully understandable
    statements. Ensure that no pronouns are used in any statement. Return the
    statements as a JSON list of strings.

    ## Example

    Question: Who was Albert Einstein and what is he best known for?
    Answer: He was a German-born theoretical physicist, widely acknowledged to be one of the greatest and most influential physicists of all time. He was best known for developing the theory of relativity, he also made important contributions to the development of the theory of quantum mechanics.
    Statements:
    [
      "Albert Einstein was a German-born theoretical physicist.",
      "Albert Einstein is recognized as one of the greatest and most influential physicists of all time.",
      "Albert Einstein was best known for developing the theory of relativity.",
      "Albert Einstein also made important contributions to the development of the theory of quantum mechanics."
    ]

    ## Your Turn

    Question: {{ question }}
    Answer: {{ answer }}
    Statements:

answer_correctness_classifier:
  template: |
    Given a ground truth and an answer statements, analyze each statement and
    classify them in one of the following categories: TP (true positive):
    statements that are present in answer that are also directly supported by one
    or more statements in ground truth, FP (false positive): statements present
    in the answer but not directly supported by any statement in ground truth,
    FN (false negative): statements found in the ground truth but not present in
    answer. Each statement can only belong to one of the categories. Provide a
    reason for each classification.

    ## Example 1

    Question: What powers the sun and what is its primary function?
    Answer statements:
      - "The sun is powered by nuclear fission, similar to nuclear reactors on Earth."
      - "The primary function of the sun is to provide light to the solar system."
    Ground truth statements:
      - "The sun is powered by nuclear fusion, where hydrogen atoms fuse to form helium."
      - "This fusion process in the sun's core releases a tremendous amount of energy."
      - "The energy from the sun provides heat and light, which are essential for life on Earth."
      - "The sun's light plays a critical role in Earth's climate system."
      - "Sunlight helps to drive the weather and ocean currents."
    Classification:
    {
      "TP": [
        {"statement": "The primary function of the sun is to provide light to the solar system.",
         "reason": "This statement is somewhat supported by the ground truth mentioning the sun providing light and its roles, though it focuses more broadly on the sun's energy."}
      ],
      "FP": [
        {"statement": "The sun is powered by nuclear fission, similar to nuclear reactors on Earth.",
         "reason": "This statement is incorrect and contradicts the ground truth which states that the sun is powered by nuclear fusion."}
      ],
      "FN": [
        {"statement": "The sun is powered by nuclear fusion, where hydrogen atoms fuse to form helium.",
         "reason": "This accurate description of the sun's power source is not included in the answer."},
        {"statement": "This fusion process in the sun's core releases a tremendous amount of energy.",
         "reason": "This process and its significance are not mentioned in the answer."},
        {"statement": "The energy from the sun provides heat and light, which are essential for life on Earth.",
         "reason": "The answer only mentions light, omitting the essential aspects of heat and its necessity for life, which the ground truth covers."},
        {"statement": "The sun's light plays a critical role in Earth's climate system.",
         "reason": "This broader impact of the sun's light on Earth's climate system is not addressed in the answer."},
        {"statement": "Sunlight helps to drive the weather and ocean currents.",
         "reason": "The effect of sunlight on weather patterns and ocean currents is omitted in the answer."}
      ]
    }

    ## Example 2

    Question: What is the boiling point of water?
    Answer statements:
      - "The boiling point of water is 100 degrees Celsius at sea level"
    Ground truth statements:
      - "The boiling point of water is 100 degrees Celsius (212 degrees Fahrenheit) at sea level."
      - "The boiling point of water can change with altitude."
    Classification:
    {
      "TP": [
        {"statement": "The boiling point of water is 100 degrees Celsius at sea level",
         "reason": "This statement is directly supported by the ground truth which specifies the boiling point of water as 100 degrees Celsius at sea level."}
      ],
      "FP": [],
      "FN": [
        {"statement": "The boiling point of water can change with altitude.",
         "reason": "This additional information about how the boiling point of water can vary with altitude is not mentioned in the answer."}
      ]
    }

    ## Your Turn

    Question: {{ question }}
    Answer statements:
    {% for s in answer_statements %}  - {{ s | tojson }}
    {% endfor %}
    Ground truth statements:
    {% for s in ground_truth_statements %}  - {{ s | tojson }}
    {% endfor %}
    Classification:

faithfulness_nli:
  template: |
    Your task is to judge the faithfulness of a series of statements based on a
    given context. For each statement you must return verdict as 1 if the
    statement can be directly inferred based on the context or 0 if the statement
    can not be directly inferred based on the context. Provide a brief reason
    for each verdict.

    ## Example

    Context:
    John is a student at XYZ University. He is pursuing a degree in Computer
    Science. He is enrolled in several courses this semester, including Data
    Structures, Algorithms, and Database Management. John is a diligent student
    and spends a significant amount of time studying and completing assignments.
    He often stays late in the library to work on his projects.

    Statements:
      - "John is majoring in Biology."
      - "John is taking a course on Artificial Intelligence."
      - "John is a dedicated student."
      - "John has a part-time job."

    Verdicts:
    {
      "statements": [
        {"statement": "John is majoring in Biology.",
         "reason": "John's major is explicitly mentioned as Computer Science. There is no information suggesting he is majoring in Biology.",
         "verdict": 0},
        {"statement": "John is taking a course on Artificial Intelligence.",
         "reason": "The context mentions the courses John is currently enrolled in, and Artificial Intelligence is not mentioned. Therefore, it cannot be deduced that John is taking a course on AI.",
         "verdict": 0},
        {"statement": "John is a dedicated student.",
         "reason": "The context states that he spends a significant amount of time studying and completing assignments. Additionally, it mentions that he often stays late in the library to work on his projects, which implies dedication.",
         "verdict": 1},
        {"statement": "John has a part-time job.",
         "reason": "There is no information given in the context about John having a part-time job.",
         "verdict": 0}
      ]
    }

    ## Your Turn

    Context:
    {{ context }}

    Statements:
    {% for s in statements %}  - {{ s | tojson }}
    {% endfor %}
    Verdicts:

context_precision_verdict:
  template: |
    Given question, answer and context verify if the context was useful in
    arriving at the given answer. Give verdict as 1 if useful and 0 if not, with
    a brief reason. Return JSON with keys "reason" and "verdict".

    ## Example 1

    Question: What can you tell me about Albert Einstein?
    Context: Albert Einstein (14 March 1879 – 18 April 1955) was a German-born theoretical physicist, widely held to be one of the greatest and most influential scientists of all time. Best known for developing the theory of relativity, he also made important contributions to quantum mechanics, and was thus a central figure in the revolutionary reshaping of the scientific understanding of nature that modern physics accomplished in the first decades of the twentieth century. ...
    Answer: Albert Einstein, born on 14 March 1879, was a German-born theoretical physicist, widely held to be one of the greatest and most influential scientists of all time. He received the 1921 Nobel Prize in Physics for his services to theoretical physics.
    Verdict:
    {"reason": "The provided context was indeed useful in arriving at the given answer. The context includes key information about Albert Einstein's life and contributions, which are reflected in the answer.", "verdict": 1}

    ## Example 2

    Question: What is the tallest mountain in the world?
    Context: The Andes is the longest continental mountain range in the world, located in South America. It stretches across seven countries and features many of the highest peaks in the Western Hemisphere.
    Answer: Mount Everest.
    Verdict:
    {"reason": "The provided context discusses the Andes mountain range, which does not include Mount Everest or directly relate to the question about the world's tallest mountain.", "verdict": 0}

    ## Your Turn

    Question: {{ question }}
    Context: {{ context }}
    Answer: {{ answer }}
    Verdict:

context_recall_classification:
  template: |
    Given a context and an answer, analyze each sentence in the answer and
    classify if the sentence can be attributed to the given context or not. Use
    only 1 (Yes) or 0 (No) as a binary classification. Output JSON with a
    "classifications" list, each item having "statement", "reason", and
    "attributed".

    ## Example

    Question: What can you tell me about Albert Einstein?
    Context: Albert Einstein (14 March 1879 - 18 April 1955) was a German-born theoretical physicist, widely held to be one of the greatest and most influential scientists of all time. Best known for developing the theory of relativity, he also made important contributions to quantum mechanics. He received the 1921 Nobel Prize in Physics 'for his services to theoretical physics, and especially for his discovery of the law of the photoelectric effect'.
    Answer: Albert Einstein, born on 14 March 1879, was a German-born theoretical physicist, widely held to be one of the greatest and most influential scientists of all time. He received the 1921 Nobel Prize in Physics for his services to theoretical physics. He published 4 papers in 1905. Einstein moved to Switzerland in 1895.
    Output:
    {
      "classifications": [
        {"statement": "Albert Einstein, born on 14 March 1879, was a German-born theoretical physicist, widely held to be one of the greatest and most influential scientists of all time.",
         "reason": "The date of birth of Einstein is mentioned clearly in the context.",
         "attributed": 1},
        {"statement": "He received the 1921 Nobel Prize in Physics for his services to theoretical physics.",
         "reason": "The exact sentence is present in the given context.",
         "attributed": 1},
        {"statement": "He published 4 papers in 1905.",
         "reason": "There is no mention about papers he wrote in the given context.",
         "attributed": 0},
        {"statement": "Einstein moved to Switzerland in 1895.",
         "reason": "There is no supporting evidence for this in the given context.",
         "attributed": 0}
      ]
    }

    ## Your Turn

    Question: {{ question }}
    Context: {{ context }}
    Answer: {{ answer }}
    Output:

# A cheap single-shot accuracy judge kept alongside the RAGAS metrics for a
# quick, comparable signal (does the answer contain every ground-truth claim?).
accuracy:
  template: |
    You are evaluating whether an agent's answer is correct based on a ground
    truth expected answer.

    **Question**: {{ question }}

    **Expected Answer** (ground truth):
    {{ expected_answer }}

    **Agent's Answer**:
    {{ agent_answer }}

    Score 1 if the agent's answer contains all the key claims of the expected
    answer (different wording is fine, as long as the meaning matches and nothing
    is contradicted). Score 0 otherwise.

    Respond with:
    - value: 1 or 0
    - reason: brief explanation of which claims were present or missing
